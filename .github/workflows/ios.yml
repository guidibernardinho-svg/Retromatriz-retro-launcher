name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build IPA
        run: |
          # Comandos para compilar o app (ex: fastlane gym)
          xcodebuild -workspace SeuApp.xcworkspace -scheme SeuApp -configuration Release archive -archivePath $PWD/build/SeuApp.xcarchive
          xcodebuild -exportArchive -archivePath $PWD/build/SeuApp.xcarchive -exportPath $PWD/build -exportOptionsPlist ExportOptions.plist
      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: ios-artifact
          path: build/SeuApp.ipa

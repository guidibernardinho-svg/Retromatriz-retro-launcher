name: Build iOS App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest # Necessário para Xcode

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        env:
          P12_FILE_BASE64: ${{ secrets.P12_FILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Criar keychain temporário
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          
          # Importar certificado
          echo "$P12_FILE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install Provisioning Profile
        env:
          PROVISION_FILE_BASE64: ${{ secrets.PROVISION_FILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_FILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision

      - name: Build Archive
        run: |
          xcodebuild clean archive -project SEU_PROJETO.xcodeproj -scheme SUA_SCHEME -configuration Release -archivePath build/MyApp.xcarchive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive -archivePath build/MyApp.xcarchive -exportPath build/IPA -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
    
        with:
          name: app-ipa
          path: build/IPA/*.ipa
